#! db-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: db
    namespace: siga1-modern
    labels:
        com.docker.compose.project: siga1-modern
        com.docker.compose.service: db
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: siga1-modern
            com.docker.compose.service: db
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: siga1-modern
                com.docker.compose.service: db
                com.docker.compose.network.default: "true"
        spec:
            containers:
                - name: siga-mysql
                  image: mysql:8.0
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: MYSQL_DATABASE
                      value: "siga_db"
                    - name: MYSQL_ROOT_PASSWORD
                      value: "root"
                  livenessProbe:
                    exec:
                        command: [mysqladmin ping -h localhost -u root -proot]
                    periodSeconds: 10
                    initialDelaySeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 10
                  ports:
                    - name: db-33060
                      containerPort: 33060
                    - name: db-3306
                      containerPort: 3306
                  volumeMounts:
                    - name: var-lib-mysql
                      mountPath: /var/lib/mysql
            volumes:
                - name: var-lib-mysql
                  persistentVolumeClaim:
                    claimName: db-mysql-data

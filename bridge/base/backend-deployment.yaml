metadata:
    name: backend
    namespace: siga1-modern
    labels:
        com.docker.compose.project: siga1-modern
        com.docker.compose.service: backend
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: siga1-modern
            com.docker.compose.service: backend
    strategy:
        type: Recreate
    template:
